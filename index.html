<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; }
        #quiz-outer-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 9999; background: rgba(0, 0, 0, 0.7); }
        #quiz-card { width: 85%; max-width: 420px; background: #ffffff; padding: 25px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); text-align: center; }
        #question-num { color: #3498db; font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        #question { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2c3e50; line-height: 1.5; min-height: 60px; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #f1f1f1; background: #fdfdfd; border-radius: 15px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; color: #34495e; }
        .correct-anim { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-anim { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        #score-board { position: fixed; top: 20px; left: 20px; background: #2c3e50; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 10000; }
        .result-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .timestamp { font-size: 12px; color: #7f8c8d; background: #f1f1f1; padding: 5px 10px; border-radius: 10px; display: inline-block; margin-bottom: 15px; }
        .discount-msg { font-size: 16px; font-weight: 600; color: #2c3e50; margin: 10px 0; line-height: 1.4; }
        .promo-val { font-size: 32px; font-weight: 900; color: #2ecc71; display: block; margin-top: 5px; }
        .coupon-box { background: #f9f9f9; padding: 15px; border: 2px dashed #bdc3c7; border-radius: 15px; margin-top: 10px; }
        .coupon-code { font-family: monospace; font-size: 22px; font-weight: bold; color: #2c3e50; }
        .terms { font-size: 10px; color: #e74c3c; margin-top: 5px; font-weight: 600; }
        button.retry-btn { margin-top: 20px; padding: 12px 30px; background: #2c3e50; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* Scratch Card Styles */
        #scratch-area { position: relative; width: 280px; height: 180px; margin: 15px auto; display: none; }
        #scratch-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; border-radius: 15px; }
        #reward-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; background: #f9f9f9; border: 2px dashed #bdc3c7; }
    </style>
</head>
<body>

    <div id="score-board">Correct: <span id="correct-count">0</span> / 10</div>

    <div id="quiz-outer-container">
        <div id="quiz-card">
            <!-- Quiz Questions Section -->
            <div id="quiz-content">
                <div id="question-num">Question 1/10</div>
                <div id="question">Loading...</div>
                <div id="options"></div>
            </div>

            <!-- Scratch Card Section (Shows only if 10/10) -->
            <div id="scratch-area">
                <div id="reward-content">
                    <p style="margin:0; font-size: 11px; color: #3498db; font-weight: 800;">YOUR REWARD</p>
                    <div class="discount-msg">
                        LKR 500-க்கு மேல் வாங்கினால்<br>
                        <span class="promo-val">LKR 100 OFF</span>
                    </div>
                    <div class="coupon-code" style="font-size: 18px;">IIST100WIN</div>
                </div>
                <canvas id="scratch-canvas" width="280" height="180"></canvas>
            </div>

            <!-- Final Result Screen -->
            <div id="result-screen" style="display: none;">
                <div id="result-title" class="result-title">முடிவு</div>
                <div id="time-display" class="timestamp"></div>
                <p style="font-weight: 600; margin: 5px 0;">சரியான பதில்கள்: <span id="final-correct">0</span> / 10</p>
                
                <div id="discount-info" class="discount-msg"></div>
                
                <div id="coupon-area" style="display:none;" class="coupon-box">
                    <p style="margin:0 0 5px 0; font-size: 11px; color: #3498db; font-weight: 800;">VALID FOR 2 DAYS ONLY</p>
                    <div class="coupon-code">IIST100WIN</div>
                    <div class="terms">*நிபந்தனைகளுக்கு உட்பட்டது</div>
                </div>
                
                <p style="font-size: 10px; margin-top: 15px; color: #95a5a6;">இந்த ஸ்கிரீன்ஷாட்டை கடை உரிமையாளரிடம் காட்டவும்.</p>
                <button class="retry-btn" onclick="location.reload()">Retry Quiz</button>
            </div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="gate-target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
        const questionBank = [
            { q: "IPv6 முகவரி எத்தனை பிட்களைக் கொண்டது?", a: ["128 Bits", "32 Bits", "64 Bits", "256 Bits"], c: "128 Bits" },
            { q: "கணினியின் தந்தை யார்?", a: ["Charles Babbage", "Alan Turing", "Bill Gates", "Jobs"], c: "Charles Babbage" },
            { q: "1 TB என்பது எத்தனை GB?", a: ["1024 GB", "1000 GB", "1100 GB", "512 GB"], c: "1024 GB" },
            { q: "IIST அமைந்துள்ள வீதி எது?", a: ["Navalar Road", "Hospital Road", "Kandy Road", "Main Street"], c: "Navalar Road" },
            { q: "கணினியின் தற்காலிக நினைவகம் எது?", a: ["RAM", "ROM", "Hard Disk", "Cache"], c: "RAM" },
            { q: "WWW-ஐ உருவாக்கியவர் யார்?", a: ["Tim Berners-Lee", "Vint Cerf", "Larry Page", "Elon Musk"], c: "Tim Berners-Lee" },
            { q: "Python உருவாக்கியவர் யார்?", a: ["Guido van Rossum", "Dennis Ritchie", "James Gosling", "Bjarne"], c: "Guido van Rossum" },
            { q: "CPU-இன் வேகம் எதில் அளவிடப்படுகிறது?", a: ["Hertz", "Bits", "Bytes", "Amps"], c: "Hertz" },
            { q: "எது ஒரு 'Open Source' OS?", a: ["Linux", "Windows", "macOS", "iOS"], c: "Linux" },
            { q: "HTTP-இல் 'S' என்பதன் பொருள்?", a: ["Secure", "Simple", "Standard", "System"], c: "Secure" },
            // ... (You can add more from your original bank)
            
    { q: "கணினித் திரையில் உள்ள படங்களை உருவாக்கும் மிகச்சிறிய அலகு எது?", a: ["Pixel", "Bit", "Byte", "Point"], c: "Pixel" },
    { q: "முதல் தலைமுறை கணினிகளில் பயன்படுத்தப்பட்ட தொழில்நுட்பம் எது?", a: ["Vacuum Tubes", "Transistors", "Integrated Circuits", "Microprocessors"], c: "Vacuum Tubes" },
    { q: "இரண்டாம் தலைமுறை கணினிகளில் பயன்படுத்தப்பட்டது எது?", a: ["Transistors", "Vacuum Tubes", "Silicon Chips", "AI"], c: "Transistors" },
    { q: "நான்காம் தலைமுறை கணினிகளில் அறிமுகமானது எது?", a: ["Microprocessors", "Vacuum Tubes", "Transistors", "Valves"], c: "Microprocessors" },
    { q: "இணையத்தில் ஒரு கோப்பை தேடுவது எவ்வாறு அழைக்கப்படும்?", a: ["Browsing", "Surfing", "Searching", "Streaming"], c: "Searching" },
    { q: "PDF-இன் முழு வடிவம் என்ன?", a: ["Portable Document Format", "Personal Data File", "Printable Document", "Public Data Format"], c: "Portable Document Format" },
    { q: "WiFi-இன் முழு வடிவம் என்ன?", a: ["Wireless Fidelity", "Wireless Focus", "Wireless Fix", "Wire Free"], c: "Wireless Fidelity" },
    { q: "எது ஒரு கணினி மென்பொருள் (Software)?", a: ["Windows", "Keyboard", "Mouse", "Monitor"], c: "Windows" },
    { q: "எது ஒரு வன்பொருள் (Hardware)?", a: ["CPU", "MS Word", "Photoshop", "Android"], c: "CPU" },
    { q: "தற்காலிகமாக தரவுகளை சேமிக்கும் நினைவகம் எது?", a: ["RAM", "ROM", "SSD", "Hard Disk"], c: "RAM" },
    { q: "நிரந்தரமாக தரவுகளை சேமிக்கும் நினைவகம் எது?", a: ["Hard Disk", "RAM", "Cache", "Register"], c: "Hard Disk" },
    { q: "BIOS என்பதன் விரிவாக்கம் என்ன?", a: ["Basic Input Output System", "Beginners Input Output", "Basic Interlink System", "Binary Input Output"], c: "Basic Input Output System" },
    { q: "கணினியில் தரவுகளை உள்ளீடு செய்ய பயன்படுவது எது?", a: ["Input Device", "Output Device", "Storage Device", "Processing Device"], c: "Input Device" },
    { q: "கணினியின் முடிவுகளை வெளியிட பயன்படுவது எது?", a: ["Output Device", "Input Device", "Memory", "Chip"], c: "Output Device" },
    { q: "எது ஒரு 'Pointing Device' அல்ல?", a: ["Keyboard", "Mouse", "Joystick", "Trackball"], c: "Keyboard" },
    { q: "கணினியின் வேகத்தை குறிக்கும் அலகு எது?", a: ["Hertz (Hz)", "Metre", "Gram", "Litre"], c: "Hertz (Hz)" },
    { q: "CPU-இன் உள்ளே கணக்கீடுகளைச் செய்யும் பகுதி எது?", a: ["ALU", "CU", "MU", "RAM"], c: "ALU" },
    { q: "CPU-இல் உள்ள 'CU' என்பது எதைக் குறிக்கிறது?", a: ["Control Unit", "Central Unit", "Common Unit", "Calculated Unit"], c: "Control Unit" },
    { q: "கணினி வலையமைப்பின் தந்தை யார்?", a: ["Vint Cerf", "Charles Babbage", "Newton", "Alan Turing"], c: "Vint Cerf" },
    { q: "HTML-இல் 'L' என்பதன் பொருள் என்ன?", a: ["Language", "Link", "Logic", "Level"], c: "Language" },
    { q: "எது ஒரு 'Web Browser' அல்ல?", a: ["Facebook", "Chrome", "Firefox", "Safari"], c: "Facebook" },
    { q: "கணினியில் ஒரு கோப்பை நிரந்தரமாக அழிக்கப் பயன்படும் சாவி எது?", a: ["Shift + Delete", "Ctrl + Delete", "Delete", "Backspace"], c: "Shift + Delete" },
    { q: "Windows கணினியில் ஒரு ஜன்னலை மூடுவதற்கு பயன்படும் குறுக்குவழி?", a: ["Alt + F4", "Ctrl + C", "Ctrl + V", "Shift + Esc"], c: "Alt + F4" },
    { q: "MS Word-இல் ஆவணத்தை அச்சிட (Print) பயன்படும் குறுக்குவழி?", a: ["Ctrl + P", "Ctrl + S", "Ctrl + O", "Ctrl + N"], c: "Ctrl + P" },
    { q: "புதிய கோப்பை உருவாக்க (New) பயன்படும் குறுக்குவழி?", a: ["Ctrl + N", "Ctrl + M", "Ctrl + J", "Ctrl + K"], c: "Ctrl + N" },
    { q: "கணினி வலையமைப்பில் 'IP' என்பது எதைக் குறிக்கிறது?", a: ["Internet Protocol", "Internal Process", "Information Post", "Input Page"], c: "Internet Protocol" },
    { q: "மின்னஞ்சலை முதன்முதலில் கண்டுபிடித்தவர் யார்?", a: ["Ray Tomlinson", "Tim Berners", "Bill Gates", "Mark Zuckerberg"], c: "Ray Tomlinson" },
    { q: "உலகிலேயே மிகப்பெரிய தேடல் பொறி (Search Engine) எது?", a: ["Google", "Yahoo", "Bing", "DuckDuckGo"], c: "Google" },
    { q: "எது மின்னணு வர்த்தகம் (E-Commerce) தளம் அல்ல?", a: ["WhatsApp", "Amazon", "eBay", "Daraz"], c: "WhatsApp" },
    { q: "கணினியில் ஒரு கட்டளையை ரத்து செய்ய (Cancel) பயன்படும் விசை?", a: ["Esc", "Enter", "Tab", "Alt"], c: "Esc" },
    { q: "RAM என்பது என்ன வகை நினைவகம்?", a: ["Volatile", "Non-Volatile", "Permanent", "External"], c: "Volatile" },
    { q: "ஒரு 'Terabyte' என்பது எத்தனை GB?", a: ["1024 GB", "1000 GB", "100 GB", "2048 GB"], c: "1024 GB" },
    { q: "கணினியின் அனைத்து பாகங்களையும் இணைக்கும் முக்கிய பலகை எது?", a: ["Motherboard", "Sound Card", "Graphics Card", "Network Card"], c: "Motherboard" },
    { q: "எது ஒரு 'Spreadsheet' மென்பொருள்?", a: ["MS Excel", "MS Word", "Notepad", "PowerPoint"], c: "MS Excel" },
    { q: "கணினியில் 'Folder' எதற்காக உருவாக்கப்படுகிறது?", a: ["கோப்புகளை வகைப்படுத்த", "விளையாட", "இணையத்திற்கு செல்ல", "பாட்டுக் கேட்க"], c: "கோப்புகளை வகைப்படுத்த" },
    { q: "எது ஒரு 'Storage Device' அல்ல?", a: ["Monitor", "Hard Disk", "Pen Drive", "CD"], c: "Monitor" },
    { q: "கணினியில் 'Wallpaper' என்பது எதைக் குறிக்கும்?", a: ["திரை பின்னணி படம்", "சுவர் சித்திரம்", "கோப்பின் பெயர்", "மின்னஞ்சல்"], c: "திரை பின்னணி படம்" },
    { q: "எது ஆப்பிள் (Apple) நிறுவனத்தின் தயாரிப்பு?", a: ["iPhone", "Galaxy S24", "Pixel 8", "Redmi"], c: "iPhone" },
    { q: "இணையத்தில் தகவல்களைப் பரிமாறப் பயன்படும் பொதுவான மொழி?", a: ["HTTP", "CPU", "RAM", "UPS"], c: "HTTP" },
    { q: "மின்னஞ்சல் முகவரியில் உள்ள '@' குறியீடு எதைப் பிரிக்கிறது?", a: ["பயனர் பெயர் மற்றும் டொமைன்", "பெயர் மற்றும் வயது", "ஊர் மற்றும் நாடு", "தேதி மற்றும் மாதம்"], c: "பயனர் பெயர் மற்றும் டொமைன்" },
    { q: "கணினியில் வைரஸைத் தடுக்க பயன்படுவது எது?", a: ["Antivirus", "Virus", "Trojan", "Spyware"], c: "Antivirus" },
    { q: "USB விரிவாக்கம் என்ன?", a: ["Universal Serial Bus", "United Serial", "Unit Serial", "User Bus"], c: "Universal Serial Bus" },
    { q: "எது உலகின் முதல் கணினி மொழி?", a: ["FORTRAN", "C", "C++", "Java"], c: "FORTRAN" },
    { q: "கணினியில் 'Cut' செய்த தரவு எங்கு இருக்கும்?", a: ["Clipboard", "Monitor", "Keyboard", "Hard Disk"], c: "Clipboard" },
    { q: "GUI-இன் முழு வடிவம் என்ன?", a: ["Graphical User Interface", "Global User Info", "General User Info", "Guide Interface"], c: "Graphical User Interface" },
    { q: "எது ஒரு 'External Memory'?", a: ["Pen Drive", "RAM", "ROM", "Cache"], c: "Pen Drive" },
    { q: "எது ஒரு மென்பொருள் நிறுவனம்?", a: ["Microsoft", "Samsung", "Toyota", "Nike"], c: "Microsoft" },
    { q: "கணினியில் அனைத்து எழுத்துக்களையும் தேர்ந்தெடுக்க (Select All) உதவுவது?", a: ["Ctrl + A", "Ctrl + B", "Ctrl + C", "Ctrl + D"], c: "Ctrl + A" },
    { q: "MS Word ஒரு...?", a: ["Word Processor", "Spreadsheet", "Database", "Browser"], c: "Word Processor" },
    { q: "எது தரவுத்தள (Database) மென்பொருள்?", a: ["MS Access", "Notepad", "Paint", "Chrome"], c: "MS Access" },
    { q: "இணையத்தில் பாதுகாப்பற்ற மென்பொருளை எவ்வாறு அழைப்பார்கள்?", a: ["Malware", "Hardware", "Software", "Firmware"], c: "Malware" },
    { q: "CD-இன் முழு வடிவம் என்ன?", a: ["Compact Disc", "Computer Disc", "Common Disc", "Carbon Disc"], c: "Compact Disc" },
    { q: "DVD-இன் முழு வடிவம் என்ன?", a: ["Digital Versatile Disc", "Data Video Disc", "Digital Visual Disc", "Data View Disc"], c: "Digital Versatile Disc" },
    { q: "எது கணினியின் 'Brain' என அழைக்கப்படுகிறது?", a: ["CPU", "RAM", "Monitor", "Mouse"], c: "CPU" },
    { q: "IIST அமைந்துள்ள இடம் எது?", a: ["Jaffna", "Colombo", "Kandy", "Galle"], c: "Jaffna" },
    { q: "இணையத்தில் கோப்புகளை ஒரு இடத்திலிருந்து மற்ற இடத்திற்கு அனுப்பும் விதிமுறை?", a: ["FTP", "RAM", "ROM", "SSD"], c: "FTP" },
    { q: "இணையதளங்களின் முதல் பக்கத்தை எவ்வாறு அழைப்பார்கள்?", a: ["Home Page", "Last Page", "Side Page", "Book Page"], c: "Home Page" },

       ];

        let quizData = []; 
        let currentIdx = 0;
        let correctAnswers = 0;
        let canClick = true;

        const target = document.querySelector('#gate-target');
        const quizUI = document.getElementById('quiz-outer-container');

        function prepareQuiz() {
            let shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            quizData = shuffled.slice(0, 10);
            quizData.forEach(item => item.a.sort(() => 0.5 - Math.random()));
        }

        target.addEventListener("targetFound", () => {
            if (currentIdx === 0) {
                prepareQuiz();
                quizUI.style.display = 'flex';
                loadQuestion();
            }
        });

        function loadQuestion() {
            canClick = true;
            const data = quizData[currentIdx];
            document.getElementById('question-num').innerText = `Question ${currentIdx + 1}/10`;
            document.getElementById('question').innerText = data.q;
            const btnArea = document.getElementById('options');
            btnArea.innerHTML = '';
            data.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => handleAnswer(b, opt, data.c);
                btnArea.appendChild(b);
            });
        }

        function handleAnswer(btn, selected, correct) {
            if (!canClick) return;
            canClick = false;
            const allBtns = document.querySelectorAll('.option-btn');
            if (selected === correct) {
                btn.classList.add('correct-anim');
                correctAnswers++;
                document.getElementById('correct-count').innerText = correctAnswers;
            } else {
                btn.classList.add('wrong-anim');
                allBtns.forEach(b => { if (b.innerText === correct) b.classList.add('correct-anim'); });
            }
            setTimeout(() => {
                currentIdx++;
                if (currentIdx < quizData.length) loadQuestion();
                else processFinish();
            }, 1500);
        }

        function processFinish() {
            document.getElementById('quiz-content').style.display = 'none';
            if (correctAnswers === 10) {
                initScratchCard();
            } else {
                showResult();
            }
        }

        function initScratchCard() {
            const scratchArea = document.getElementById('scratch-area');
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            scratchArea.style.display = 'block';

            // Fill canvas with silver color
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add hint text
            ctx.fillStyle = '#7f8c8d';
            ctx.font = 'bold 18px Poppins';
            ctx.textAlign = 'center';
            ctx.fillText('தேய்த்து தள்ளுபடியைப் பெறுக!', canvas.width/2, canvas.height/2);

            let isDrawing = false;

            function scratch(e) {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                checkScratchPercent();
            }

            function checkScratchPercent() {
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let transparent = 0;
                for (let i = 0; i < pixels.length; i += 4) {
                    if (pixels[i + 3] < 128) transparent++;
                }
                // If 40% scratched, show final result
                if (transparent / (pixels.length / 4) > 0.4) {
                    setTimeout(() => {
                        scratchArea.style.display = 'none';
                        showResult();
                    }, 500);
                }
            }

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', () => isDrawing = true);
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });
        }

        function showResult() {
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-correct').innerText = correctAnswers;
            const now = new Date();
            const timeStamp = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
            document.getElementById('time-display').innerText = timeStamp;
            
            const resTitle = document.getElementById('result-title');
            const discInfo = document.getElementById('discount-info');
            const coupArea = document.getElementById('coupon-area');

            if(correctAnswers === 10) {
                resTitle.innerText = "வாழ்த்துகள்!";
                resTitle.style.color = "#2ecc71";
                discInfo.innerHTML = "LKR 500-க்கு மேல் பொருட்கள் வாங்கும்போது<br><span class='promo-val'>LKR 100 OFF</span>";
                coupArea.style.display = 'block';
            } else {
                resTitle.innerText = "மீண்டும் முயற்சிப்போம்!";
                resTitle.style.color = "#e74c3c";
                discInfo.innerHTML = "<span style='color:#e74c3c'>தள்ளுபடி இல்லை</span><br><span style='font-size:11px'>10/10 எடுத்தால் மட்டுமே தள்ளுபடி உண்டு!</span>";
                coupArea.style.display = 'none';
            }
        }
