<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* கேமரா முழு திரையில் தெரிய */
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* குவிஸ் கார்டு - கேமராவிற்கு மேலடுக்கில் (z-index) இருக்க வேண்டும் */
        #quiz-outer-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; /* ஸ்கேன் செய்யும் வரை மறைவு */
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            background: rgba(0, 0, 0, 0.2); /* லேசான கருப்பு நிழல் */
        }

        #quiz-card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            pointer-events: auto; /* பட்டன்கள் வேலை செய்ய */
        }

        #question { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #333; }

        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #007bff; background: #fff;
            border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }

        .option-btn:active { background: #007bff; color: white; }

        #score-board {
            position: fixed; top: 15px; left: 15px;
            background: #27ae60; color: white;
            padding: 8px 20px; border-radius: 20px;
            font-weight: bold; z-index: 10000;
        }

        .discount-result { color: #d35400; font-size: 28px; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="score-board">Points: <span id="score">0</span></div>

    <div id="quiz-outer-container">
        <div id="quiz-card">
            <div id="quiz-content">
                <div id="question">Loading Question...</div>
                <div id="options"></div>
            </div>

            <div id="result-screen" style="display: none;">
                <h2 style="color: #27ae60;">வெற்றி!</h2>
                <p>உங்களின் மொத்த புள்ளிகள்: <span id="final-score">0</span></p>
                <div class="discount-result" id="discount-val">LKR 0</div>
                <p style="font-size: 13px;">IIST Shop-இல் இதைக் காட்டி தள்ளுபடி பெறுங்கள்!</p>
                <button onclick="location.reload()" style="padding: 10px 20px; background: #333; color: #fff; border-radius: 10px; border: none;">Restart</button>
            </div>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
        embedded vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="gate-target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
        const quizData = [
            { q: "கணினியின் தற்காலிக நினைவகம் (Temporary Memory) எது?", a: ["Hard Disk", "RAM", "Monitor"], correct: "RAM" },
            { q: "IIST கடையின் அமைவிடம் எங்கே உள்ளது?", a: ["Navalar Road", "Hospital Road", "Main Street"], correct: "Navalar Road" },
            { q: "ஒரு Byte-இல் எத்தனை பிட்டுகள் (Bits) உள்ளன?", a: ["4 Bits", "8 Bits", "16 Bits"], correct: "8 Bits" }
        ];

        let currentIdx = 0;
        let score = 0;

        const target = document.querySelector('#gate-target');
        const quizUI = document.getElementById('quiz-outer-container');

        // டார்கெட் கண்டறியப்பட்டால் குவிஸைக் காட்டு
        target.addEventListener("targetFound", () => {
            if (currentIdx < quizData.length) {
                quizUI.style.display = 'flex';
                loadNext();
            }
        });

        function loadNext() {
            const data = quizData[currentIdx];
            document.getElementById('question').innerText = data.q;
            const btnArea = document.getElementById('options');
            btnArea.innerHTML = '';

            data.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if(opt === data.correct) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                    currentIdx++;
                    if(currentIdx < quizData.length) loadNext();
                    else showFinal();
                };
                btnArea.appendChild(b);
            });
        }

        function showFinal() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;

            let disc = "LKR 20 OFF";
            if(score >= 30) disc = "LKR 100 OFF";
            else if(score >= 20) disc = "LKR 50 OFF";

            document.getElementById('discount-val').innerText = disc;
        }
    </script>
</body>
</html>
